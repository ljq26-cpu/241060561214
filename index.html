<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图书馆座位预约系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0b1120;--sidebar:#111827;--card:#1a2236;--border:#283350;--text:#e2e8f0;--muted:#7a8ba5;--accent:#38bdf8;--accent2:#818cf8;--green:#22c55e;--red:#ef4444;--orange:#f59e0b;--pink:#f472b6}
body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ═══════ AUTH ═══════ */
.auth-mask{position:fixed;inset:0;z-index:900;background:rgba(5,8,18,.88);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center}
.auth-mask.gone{display:none}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:42px 40px;width:440px;max-width:94vw;position:relative;overflow:hidden}
.auth-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--pink))}
.auth-card h2{text-align:center;font-size:1.5rem;margin-bottom:4px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.auth-card .sub{text-align:center;color:var(--muted);font-size:.84rem;margin-bottom:28px}
.atabs{display:flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:22px}
.atabs button{flex:1;padding:10px;border:none;background:none;color:var(--muted);font-size:.9rem;cursor:pointer;transition:.2s}
.atabs button.on{background:var(--accent);color:#0b1120;font-weight:700}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:.78rem;color:var(--muted);margin-bottom:5px}
.fg input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:rgba(0,0,0,.35);color:var(--text);font-size:.9rem;outline:none;transition:.2s}
.fg input:focus{border-color:var(--accent)}
.fg input::placeholder{color:#3e4f6a}
.aerr{text-align:center;font-size:.82rem;min-height:20px;margin-bottom:10px;color:var(--red)}
.aok{color:var(--green)!important}
.abtn{width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0b1120;font-size:1rem;font-weight:700;cursor:pointer;transition:.2s;margin-top:4px}
.abtn:hover{opacity:.88;transform:translateY(-1px)}

/* ═══════ HEADER ═══════ */
.topbar{height:56px;background:var(--sidebar);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:100}
.topbar h1{font-size:1.15rem;display:flex;align-items:center;gap:8px}
.topbar h1 em{font-style:normal;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.uinfo{display:flex;align-items:center;gap:14px;font-size:.84rem;color:var(--muted)}
.uinfo .uname{color:var(--accent);font-weight:600}
.uinfo button{padding:5px 16px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;font-size:.8rem;transition:.2s}
.uinfo button:hover{border-color:var(--red);color:var(--red)}

/* ═══════ LAYOUT ═══════ */
.layout{display:flex;height:calc(100vh - 56px)}

/* ── Sidebar ── */
.side{width:230px;min-width:230px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:18px 0;overflow-y:auto}
.side .stitle{font-size:.7rem;color:#475569;padding:0 18px 10px;text-transform:uppercase;letter-spacing:1.5px}
.fbtn{display:flex;align-items:center;gap:10px;width:100%;padding:11px 18px;border:none;background:none;color:var(--muted);font-size:.88rem;cursor:pointer;transition:.18s;text-align:left;border-right:3px solid transparent}
.fbtn:hover{background:rgba(255,255,255,.04);color:var(--text)}
.fbtn.on{background:rgba(56,189,248,.08);color:var(--accent);border-right-color:var(--accent)}
.fbtn .fi{font-size:1.05rem;width:24px;text-align:center}
.fbtn .fb{margin-left:auto;padding:2px 9px;border-radius:8px;font-size:.68rem;background:rgba(255,255,255,.07)}
.fbtn.locked{opacity:.35;cursor:not-allowed}
.fbtn.locked .fb{background:rgba(239,68,68,.12);color:var(--red)}
.side .spacer{flex:1}
.side .mybox{padding:14px 18px;border-top:1px solid var(--border)}
.side .mybox h4{font-size:.72rem;color:#475569;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.mycard{background:rgba(0,0,0,.25);border-radius:8px;padding:9px 11px;margin-bottom:6px;font-size:.78rem;line-height:1.55}
.mycard .mf{color:var(--accent);font-weight:600}
.mycard .ms{color:var(--muted);font-size:.72rem}
.mycard .mc{color:var(--red);cursor:pointer;font-size:.72rem;display:inline-block;margin-top:3px}
.mycard .mc:hover{text-decoration:underline}
.no-rsv{color:#334155;font-size:.78rem;font-style:italic}

/* ── Main ── */
.main{flex:1;overflow-y:auto;padding:28px 32px}

/* ── Floor Header ── */
.fheader{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:10px}
.fheader h2{font-size:1.25rem;display:flex;align-items:center;gap:8px}
.fheader .finfo{color:var(--muted);font-size:.84rem}
.fheader .finfo b{font-weight:600}
.legend{display:flex;gap:18px;flex-wrap:wrap}
.legend i{display:flex;align-items:center;gap:6px;font-style:normal;font-size:.78rem;color:var(--muted)}
.legend i b{width:13px;height:13px;border-radius:3px;display:block}

/* ── Floor Plan Container ── */
.fplan{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px 24px 24px;position:relative}
.fplan::before{content:"";position:absolute;top:0;left:24px;right:24px;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent)}
.fplan .plan-title{text-align:center;font-size:.72rem;color:#3b4f6a;letter-spacing:3px;text-transform:uppercase;margin-bottom:22px}

/* ── Drawing Canvas ── */
.drawing{position:relative;width:100%;aspect-ratio:16/10;background:rgba(0,0,0,.2);border:1px dashed var(--border);border-radius:12px;overflow:hidden}
.drawing .room-label{position:absolute;top:8px;left:50%;transform:translateX(-50%);font-size:.65rem;color:#2e4060;letter-spacing:2px;white-space:nowrap;z-index:2}
.drawing .zone-label{position:absolute;font-size:.62rem;color:#2d3f5c;letter-spacing:1px;white-space:nowrap;z-index:2}

/* ── Seat on drawing ── */
.seat{position:absolute;width:30px;height:30px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:700;color:rgba(255,255,255,.85);cursor:pointer;transition:all .2s;z-index:3;letter-spacing:-.3px}
.seat.free{background:rgba(34,197,94,.18);border:1.5px solid rgba(34,197,94,.5)}
.seat.free:hover{background:rgba(251,191,36,.22);border-color:var(--orange);transform:scale(1.18);box-shadow:0 0 14px rgba(251,191,36,.3);z-index:10}
.seat.taken{background:rgba(239,68,68,.15);border:1.5px solid rgba(239,68,68,.4);cursor:not-allowed;opacity:.6}
.seat.mine{background:rgba(56,189,248,.2);border:1.5px solid rgba(56,189,248,.55);box-shadow:0 0 10px rgba(56,189,248,.2);animation:pulse 2s infinite}
.seat.mine:hover{background:rgba(239,68,68,.18);border-color:var(--red)}
@keyframes pulse{0%,100%{box-shadow:0 0 10px rgba(56,189,248,.15)}50%{box-shadow:0 0 18px rgba(56,189,248,.35)}}

/* ── Furniture markers on drawing ── */
.furn{position:absolute;border:1px solid rgba(255,255,255,.06);border-radius:4px;background:rgba(255,255,255,.02);display:flex;align-items:center;justify-content:center;font-size:.55rem;color:#2a3a55;z-index:1}

/* ── Tooltip ── */
.tip{position:fixed;background:#1a2236;border:1px solid var(--border);border-radius:10px;padding:14px 18px;font-size:.8rem;z-index:500;pointer-events:none;opacity:0;transition:opacity .12s;box-shadow:0 10px 30px rgba(0,0,0,.55);min-width:175px;line-height:1.7}
.tip.vis{opacity:1}
.tip .tr{display:flex;justify-content:space-between;gap:14px;color:var(--muted)}
.tip .tr .v{color:var(--text);font-weight:500}
.tip .ts{margin-top:6px;padding-top:6px;border-top:1px solid var(--border);font-weight:600}

/* ── Modal ── */
.moverlay{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.moverlay.gone{display:none}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:36px;width:400px;max-width:92vw;text-align:center;position:relative;overflow:hidden}
.modal::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.modal h3{font-size:1.15rem;margin-bottom:10px}
.modal p{color:var(--muted);font-size:.86rem;margin-bottom:18px;line-height:1.6}
.modal .mbody{background:rgba(0,0,0,.22);border-radius:10px;padding:16px;margin-bottom:20px;text-align:left;font-size:.84rem;line-height:1.9}
.modal .mbody b{color:var(--accent);font-weight:600}
.modal .mbody .ct{text-align:center;margin:6px 0}
.modal .mbody .ct .big{font-size:1.3rem;color:var(--accent);font-weight:700}
.mactions{display:flex;gap:12px;justify-content:center}
.mactions button{padding:9px 28px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--text);font-size:.88rem;cursor:pointer;transition:.2s}
.mactions button:hover{background:rgba(255,255,255,.06)}
.mactions .mp{background:var(--accent);color:#0b1120;border-color:var(--accent);font-weight:700}
.mactions .mp:hover{opacity:.85}
.mactions .md{border-color:var(--red);color:var(--red)}
.mactions .md:hover{background:rgba(239,68,68,.1)}

/* ── Toast ── */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 28px;font-size:.88rem;z-index:600;opacity:0;transition:.3s;pointer-events:none;box-shadow:0 8px 28px rgba(0,0,0,.45)}
.toast.vis{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:var(--red);color:var(--red)}

/* ── Stats bar ── */
.stats{display:flex;gap:14px;margin-bottom:24px;flex-wrap:wrap}
.scard{flex:1;min-width:120px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;text-align:center}
.scard .sn{font-size:1.5rem;font-weight:800}
.scard .sl{font-size:.72rem;color:var(--muted);margin-top:2px}
.scard:nth-child(1) .sn{color:var(--green)}
.scard:nth-child(2) .sn{color:var(--red)}
.scard:nth-child(3) .sn{color:var(--accent)}
.scard:nth-child(4) .sn{color:var(--orange)}
</style>
</head>
<body>

<!-- ══════════ AUTH ══════════ -->
<div class="auth-mask" id="authMask">
<div class="auth-card">
  <h2>📚 图书馆座位预约系统</h2>
  <p class="sub">欢迎使用，请登录或注册以预约座位</p>
  <div class="atabs">
    <button class="on" onclick="authTab('login')">登 录</button>
    <button onclick="authTab('reg')">注 册</button>
  </div>
  <div class="aerr" id="aerr"></div>
  <div id="fLogin">
    <div class="fg"><label>手机号码</label><input id="lPhone" placeholder="请输入手机号码" maxlength="11"></div>
    <div class="fg"><label>密码</label><input id="lPwd" type="password" placeholder="请输入密码"></div>
    <button class="abtn" onclick="doLogin()">登 录</button>
  </div>
  <div id="fReg" style="display:none">
    <div class="fg"><label>姓名 *</label><input id="rName" placeholder="请输入真实姓名"></div>
    <div class="fg"><label>手机号码 *</label><input id="rPhone" placeholder="11位手机号" maxlength="11"></div>
    <div class="fg"><label>学号 *</label><input id="rSid" placeholder="请输入学号"></div>
    <div class="fg"><label>密码 *</label><input id="rPwd" type="password" placeholder="至少6位"></div>
    <button class="abtn" onclick="doReg()">注 册</button>
  </div>
</div>
</div>

<!-- ══════════ TOPBAR ══════════ -->
<div class="topbar">
  <h1>📚 <em>图书馆座位预约系统</em></h1>
  <div class="uinfo" id="uinfo" style="display:none">
    <span>👤 <span class="uname" id="hName"></span></span>
    <span id="hSid" style="color:#475569;font-size:.78rem"></span>
    <button onclick="logout()">退出登录</button>
  </div>
</div>

<!-- ══════════ LAYOUT ══════════ -->
<div class="layout">
  <!-- Sidebar -->
  <aside class="side" id="sidebar">
    <div class="stitle">楼层导航</div>
    <button class="fbtn on" onclick="goFloor(1)"><span class="fi">🏢</span>一楼 · 综合阅览<span class="fb">100</span></button>
    <button class="fbtn" onclick="goFloor(2)"><span class="fi">🏢</span>二楼 · 自习专区<span class="fb">70</span></button>
    <button class="fbtn" onclick="goFloor(3)"><span class="fi">🏢</span>三楼 · 研修空间<span class="fb">50</span></button>
    <button class="fbtn" onclick="goFloor(4)"><span class="fi">🖥️</span>四楼 · 电子阅览<span class="fb">35</span></button>
    <button class="fbtn locked" onclick="lockedFloor(5)"><span class="fi">🔒</span>五楼 · 教师专用<span class="fb">不开放</span></button>
    <button class="fbtn locked" onclick="lockedFloor(6)"><span class="fi">🔒</span>六楼 · 机房重地<span class="fb">不开放</span></button>
    <div class="spacer"></div>
    <div class="mybox">
      <h4>📋 我的预约</h4>
      <div id="myPanel"><p class="no-rsv">暂无预约</p></div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main" id="mainArea"></div>
</div>

<!-- ══════════ TOOLTIP ══════════ -->
<div class="tip" id="tip"></div>

<!-- ══════════ MODAL ══════════ -->
<div class="moverlay gone" id="moverlay">
<div class="modal">
  <h3 id="mTitle">确认预约</h3>
  <p id="mDesc"></p>
  <div class="mbody" id="mBody"></div>
  <div class="mactions">
    <button onclick="closeModal()">取消</button>
    <button class="mp" id="mOk" onclick="doConfirm()">确认</button>
  </div>
</div>
</div>

<!-- ══════════ TOAST ══════════ -->
<div class="toast" id="toast"></div>

<script>
/* ================================================================
   FLOOR DATA — seat positions are percentages of drawing area
   ================================================================ */
const FLOORS = [
  { id:1, name:'一楼 · 综合阅览室', total:100, icon:'🏢', locked:false, zones:[
    { name:'A区 · 靠窗阅读', color:'#22c55e',
      seats: genSeats(1,10, {x0:5,y0:14,x1:30,y1:28,cols:5,rows:2}) },
    { name:'B区 · 中央大厅前段', color:'#38bdf8',
      seats: genSeats(11,30,{x0:5,y0:34,x1:45,y1:52,cols:10,rows:2}) },
    { name:'C区 · 中央大厅后段', color:'#818cf8',
      seats: genSeats(31,60,{x0:5,y0:56,x1:62,y1:74,cols:10,rows:3}) },
    { name:'D区 · 静音自习区', color:'#f59e0b',
      seats: genSeats(61,80,{x0:55,y0:14,x1:95,y1:32,cols:10,rows:2}) },
    { name:'E区 · 综合阅读区', color:'#f472b6',
      seats: genSeats(81,100,{x0:55,y0:36,x1:95,y1:56,cols:10,rows:2}) }
  ]},
  { id:2, name:'二楼 · 自习专区', total:70, icon:'🏢', locked:false, zones:[
    { name:'A区 · 阳光自习室', color:'#22c55e',
      seats: genSeats(1,20, {x0:5,y0:14,x1:48,y1:34,cols:10,rows:2}) },
    { name:'B区 · 深度学习区', color:'#38bdf8',
      seats: genSeats(21,50,{x0:5,y0:38,x1:65,y1:58,cols:10,rows:3}) },
    { name:'C区 · 考研备考区', color:'#818cf8',
      seats: genSeats(51,70,{x0:5,y0:62,x1:50,y1:82,cols:10,rows:2}) }
  ]},
  { id:3, name:'三楼 · 研修空间', total:50, icon:'🏢', locked:false, zones:[
    { name:'A区 · 小组讨论室', color:'#22c55e',
      seats: genSeats(1,15, {x0:5,y0:14,x1:40,y1:36,cols:5,rows:3}) },
    { name:'B区 · 独立研修间', color:'#38bdf8',
      seats: genSeats(16,35,{x0:5,y0:40,x1:45,y1:60,cols:10,rows:2}) },
    { name:'C区 · 文献检索区', color:'#f59e0b',
      seats: genSeats(36,50,{x0:5,y0:64,x1:42,y1:84,cols:5,rows:3}) }
  ]},
  { id:4, name:'四楼 · 电子阅览室', total:35, icon:'🖥️', locked:false, zones:[
    { name:'A区 · PC终端', color:'#22c55e',
      seats: genSeats(1,12, {x0:5,y0:14,x1:42,y1:38,cols:6,rows:2}) },
    { name:'B区 · 多媒体工位', color:'#38bdf8',
      seats: genSeats(13,25,{x0:5,y0:44,x1:42,y1:68,cols:6,rows:2}) },
    { name:'C区 · 检索终端', color:'#818cf8',
      seats: genSeats(26,35,{x0:5,y0:72,x1:42,y1:92,cols:5,rows:2}) }
  ]},
  { id:5, name:'五楼 · 教师专用 (不开放)', total:0, icon:'🔒', locked:true, zones:[] },
  { id:6, name:'六楼 · 电子阅览机房 (不开放)', total:0, icon:'🔒', locked:true, zones:[] }
];

function genSeats(from, to, area){
  const arr=[];
  const cnt=to-from+1;
  const cols=area.cols, rows=Math.ceil(cnt/cols);
  const gapX=(area.x1-area.x0)/(cols);
  const gapY=(area.y1-area.y0)/(rows);
  let idx=0;
  for(let r=0;r<rows&&idx<cnt;r++){
    for(let c=0;c<cols&&idx<cnt;c++){
      arr.push({
        id: from+idx,
        x: area.x0 + c*gapX + gapX*0.5,
        y: area.y0 + r*gapY + gapY*0.5
      });
      idx++;
    }
  }
  return arr;
}

/* ================================================================
   Storage
   ================================================================ */
const S={};
function getUsers(){return JSON.parse(localStorage.getItem('lib_u')||'{}')}
function setUsers(d){localStorage.setItem('lib_u',JSON.stringify(d))}
function getRsv(){return JSON.parse(localStorage.getItem('lib_r')||'[]')}
function setRsv(d){localStorage.setItem('lib_r',JSON.stringify(d))}

let U=null, curFloor=1, pending=null;

/* ================================================================
   Auth
   ================================================================ */
function authTab(t){
  document.querySelectorAll('.atabs button').forEach((b,i)=>b.classList.toggle('on',i===(t==='login'?0:1)));
  document.getElementById('fLogin').style.display=t==='login'?'block':'none';
  document.getElementById('fReg').style.display=t==='reg'?'block':'none';
  document.getElementById('aerr').textContent='';
  document.getElementById('aerr').className='aerr';
}
function doReg(){
  const n=document.getElementById('rName').value.trim(),
        p=document.getElementById('rPhone').value.trim(),
        s=document.getElementById('rSid').value.trim(),
        pw=document.getElementById('rPwd').value,
        e=document.getElementById('aerr');
  if(!n){e.textContent='请输入姓名';return}
  if(!/^1\d{10}$/.test(p)){e.textContent='请输入11位有效手机号';return}
  if(!s){e.textContent='请输入学号';return}
  if(pw.length<6){e.textContent='密码至少6位';return}
  const u=getUsers();
  if(u[p]){e.textContent='该手机号已注册';return}
  u[p]={name:n,phone:p,sid:s,pw:pw};
  setUsers(u);
  e.className='aerr aok';e.textContent='注册成功，请登录';
  setTimeout(()=>authTab('login'),700);
}
function doLogin(){
  const p=document.getElementById('lPhone').value.trim(),
        pw=document.getElementById('lPwd').value,
        e=document.getElementById('aerr'),
        u=getUsers();
  if(!u[p]){e.textContent='账号不存在';return}
  if(u[p].pw!==pw){e.textContent='密码错误';return}
  U=u[p];localStorage.setItem('lib_s',p);enter();
}
function logout(){U=null;localStorage.removeItem('lib_s');document.getElementById('authMask').classList.remove('gone');document.getElementById('uinfo').style.display='none'}
function enter(){
  document.getElementById('authMask').classList.add('gone');
  document.getElementById('uinfo').style.display='flex';
  document.getElementById('hName').textContent=U.name;
  document.getElementById('hSid').textContent='学号 '+U.sid;
  goFloor(1);
}
(function(){const s=localStorage.getItem('lib_s');if(s){const u=getUsers();if(u[s]){U=u[s];enter()}}})();

function lockedFloor(id){
  const f=FLOORS.find(x=>x.id===id);
  toast(f?f.name+'不对学生开放':'该楼层不开放','err');
}

/* ================================================================
   Floor rendering
   ================================================================ */
function goFloor(id){
  if(id===5||id===6){lockedFloor(id);return}
  curFloor=id;
  document.querySelectorAll('.fbtn').forEach((b,i)=>b.classList.toggle('on',i===id-1));
  const floor=FLOORS.find(f=>f.id===id);
  const rsv=getRsv();
  const myPhone=U&&U.phone;
  const taken=rsv.filter(r=>r.floor===id).map(r=>r.sid);
  const mine=rsv.filter(r=>r.floor===id&&r.user===myPhone).map(r=>r.sid);
  const free=floor.total-taken.length;

  let h=`<div class="fheader">
    <div><h2>${floor.icon} ${floor.name}</h2>
    <div class="finfo">共 <b>${floor.total}</b> 个座位 · 可用 <b style="color:var(--green)">${free}</b> · 已预约 <b style="color:var(--red)">${taken.length}</b></div></div>
    <div class="legend">
      <i><b style="background:var(--green);opacity:.5"></b>空闲</i>
      <i><b style="background:var(--red);opacity:.5"></b>已预约</i>
      <i><b style="background:var(--accent);opacity:.6"></b>我的</i>
      <i><b style="background:var(--orange);opacity:.5"></b>悬停</i>
    </div></div>
    <div class="stats">
      <div class="scard"><div class="sn">${floor.total}</div><div class="sl">总座位</div></div>
      <div class="scard"><div class="sn">${free}</div><div class="sl">空闲</div></div>
      <div class="scard"><div class="sn">${mine.length}</div><div class="sl">我的预约</div></div>
      <div class="scard"><div class="sn">${Math.round((taken.length/floor.total)*100)}%</div><div class="sl">占用率</div></div>
    </div>
    <div class="fplan">
      <div class="plan-title">▼ 俯 视 图 — 点击座位即可操作 ▼</div>
      <div class="drawing" id="draw${id}">
        <div class="room-label">📍 ${floor.name}</div>`;

  // furniture / decorative elements
  h += `<div class="furn" style="left:1%;top:46%;width:2%;height:8%;border-radius:2px" title="入口">门</div>`;
  h += `<div class="furn" style="right:1%;top:46%;width:2%;height:8%;border-radius:2px" title="出口">门</div>`;

  // render zones and seats
  floor.zones.forEach(zi=>{
    // zone background
    const zs=zi.seats;
    if(zs.length){
      let minX=100,maxX=0,minY=100,maxY=0;
      zs.forEach(s=>{minX=Math.min(minX,s.x-3);maxX=Math.max(maxX,s.x+3);minY=Math.min(minY,s.y-3);maxY=Math.max(maxY,s.y+3)});
      h+=`<div class="furn" style="left:${minX}%;top:${minY}%;width:${maxX-minX}%;height:${maxY-minY}%;border-color:${zi.color}22"></div>`;
      // zone label
      h+=`<div class="zone-label" style="left:${minX}%;top:${minY-3.5}%;color:${zi.color}">${zi.name}</div>`;
    }

    zs.forEach(s=>{
      let cls='free';
      if(mine.includes(s.id)) cls='mine';
      else if(taken.includes(s.id)) cls='taken';
      h+=`<div class="seat ${cls}" data-f="${id}" data-s="${s.id}"
            style="left:calc(${s.x}% - 15px);top:calc(${s.y}% - 15px)"
            onmouseenter="showTip(event,${id},${s.id})"
            onmouseleave="hideTip()"
            onclick="clickSeat(${id},${s.id})">${s.id}</div>`;
    });
  });

  h+=`</div></div>`;
  document.getElementById('mainArea').innerHTML=h;
  updateMyPanel();
}

/* ================================================================
   Seat interaction
   ================================================================ */
function clickSeat(fid,sid){
  if(!U){toast('请先登录','err');return}
  const rsv=getRsv();
  const existing=rsv.find(r=>r.floor===fid&&r.sid===sid);
  if(existing&&existing.user!==U.phone){toast('该座位已被其他用户预约','err');return}
  const floor=FLOORS.find(f=>f.id===fid);
  const now=new Date();
  const ts=now.getFullYear()+'-'+p(now.getMonth()+1)+'-'+p(now.getDate())+' '+p(now.getHours())+':'+p(now.getMinutes());

  pending={floor:fid,seat:sid,action:existing?'cancel':'reserve'};

  if(existing){
    document.getElementById('mTitle').textContent='取消预约';
    document.getElementById('mDesc').textContent='确定要取消以下座位的预约吗？';
    document.getElementById('mBody').innerHTML=`
      <div class="ct"><span style="font-size:1.05rem">📍 ${floor.name}</span><br>
      <span class="big">座位 ${sid} 号</span></div>
      <div style="color:#64748b;font-size:.78rem;text-align:center;margin-top:8px">
        预约人：${existing.name} (${existing.studentId})</div>`;
    document.getElementById('mOk').textContent='确认取消';
    document.getElementById('mOk').className='md';
  } else {
    document.getElementById('mTitle').textContent='确认预约';
    document.getElementById('mDesc').textContent='您即将预约以下座位：';
    document.getElementById('mBody').innerHTML=`
      <div class="ct"><span style="font-size:1.05rem">📍 ${floor.name}</span><br>
      <span class="big">座位 ${sid} 号</span></div>
      <div style="color:#64748b;font-size:.78rem;text-align:center;margin-top:8px">
        预约人：${U.name} (${U.sid})<br>时间：${ts}</div>`;
    document.getElementById('mOk').textContent='确认预约';
    document.getElementById('mOk').className='mp';
  }
  document.getElementById('moverlay').classList.remove('gone');
}
function closeModal(){document.getElementById('moverlay').classList.add('gone');pending=null}
function doConfirm(){
  if(!pending)return;
  const rsv=getRsv();
  if(pending.action==='reserve'){
    rsv.push({floor:pending.floor,sid:pending.seat,user:U.phone,name:U.name,studentId:U.sid,time:new Date().toISOString()});
    setRsv(rsv);toast('预约成功！','ok');
  } else {
    const i=rsv.findIndex(r=>r.floor===pending.floor&&r.sid===pending.seat&&r.user===U.phone);
    if(i>=0)rsv.splice(i,1);
    setRsv(rsv);toast('已取消预约','ok');
  }
  closeModal();goFloor(curFloor);updateMyPanel();
}

/* ================================================================
   Tooltip
   ================================================================ */
function showTip(e,fid,sid){
  const floor=FLOORS.find(f=>f.id===fid);
  const rsv=getRsv();
  const r=rsv.find(x=>x.floor===fid&&x.sid===sid);
  const tip=document.getElementById('tip');
  let h=`<div class="tr"><span>位置</span><span class="v">${floor.name}</span></div>
        <div class="tr"><span>座位号</span><span class="v">${sid} 号</span></div>`;
  if(r){
    const t=new Date(r.time);
    const ts=t.getFullYear()+'-'+p(t.getMonth()+1)+'-'+p(t.getDate())+' '+p(t.getHours())+':'+p(t.getMinutes());
    h+=`<div class="tr"><span>预约人</span><span class="v">${r.name}</span></div>
        <div class="tr"><span>学号</span><span class="v">${r.studentId}</span></div>
        <div class="tr"><span>时间</span><span class="v">${ts}</span></div>`;
    if(r.user===(U&&U.phone)) h+=`<div class="ts" style="color:var(--accent)">✓ 我的预约 · 点击取消</div>`;
    else h+=`<div class="ts" style="color:var(--red)">✗ 已被预约</div>`;
  } else {
    h+=`<div class="ts" style="color:var(--green)">✓ 空闲 · 点击预约</div>`;
  }
  tip.innerHTML=h;
  const rect=e.target.getBoundingClientRect();
  let lx=rect.right+12, ly=rect.top;
  if(lx+200>innerWidth) lx=rect.left-200;
  if(ly+200>innerHeight) ly=innerHeight-210;
  if(ly<10) ly=10;
  tip.style.left=lx+'px';tip.style.top=ly+'px';tip.classList.add('vis');
}
function hideTip(){document.getElementById('tip').classList.remove('vis')}

/* ================================================================
   My reservations
   ================================================================ */
function updateMyPanel(){
  const el=document.getElementById('myPanel');
  if(!U){el.innerHTML='<p class="no-rsv">请先登录</p>';return}
  const rsv=getRsv().filter(r=>r.user===U.phone);
  if(!rsv.length){el.innerHTML='<p class="no-rsv">暂无预约</p>';return}
  let h='';
  rsv.forEach(r=>{
    const f=FLOORS.find(x=>x.id===r.floor);
    const t=new Date(r.time);
    const ts=(t.getMonth()+1)+'/'+t.getDate()+' '+p(t.getHours())+':'+p(t.getMinutes());
    h+=`<div class="mycard">
      <div class="mf">🪑 ${r.seat} 号</div>
      <div class="ms">${f?f.name.split('·')[0]:'?'} · ${ts}</div>
      <span class="mc" onclick="clickSeat(${r.floor},${r.sid})">取消预约</span>
    </div>`;
  });
  el.innerHTML=h;
}

/* ================================================================
   Helpers
   ================================================================ */
function p(n){return String(n).padStart(2,'0')}
function toast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+type+' vis';
  setTimeout(()=>t.classList.remove('vis'),2400);
}
</script>
</body>
</html>
